<!DOCTYPE html>
<html>
<head><title>Sovereign RMM</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}.header h1{font-size:1.5rem;color:#60a5fa}.header .status{color:#10b981;font-size:.875rem}.container{max-width:1400px;margin:2rem auto;padding:0 2rem}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;margin-bottom:2rem}.stat-card{background:#1e293b;padding:1.5rem;border-radius:8px;border:1px solid #334155}.stat-card h3{color:#94a3b8;font-size:.875rem;text-transform:uppercase;margin-bottom:.5rem}.stat-card .value{font-size:2rem;font-weight:bold;color:#60a5fa}.devices{background:#1e293b;padding:1.5rem;border-radius:8px;border:1px solid #334155}.devices h2{margin-bottom:1rem;color:#e2e8f0}table{width:100%;border-collapse:collapse}th,td{padding:.75rem;text-align:left;border-bottom:1px solid #334155}th{background:#0f172a;font-weight:600;color:#94a3b8}.status-badge{padding:.25rem .75rem;border-radius:12px;font-size:.75rem;font-weight:600}.status-online{background:#065f46;color:#10b981}.status-offline{background:#7f1d1d;color:#ef4444}.status-locked{background:#7c2d12;color:#f97316}.loading{text-align:center;padding:2rem;color:#64748b}btn{background:#3b82f6;color:white;padding:.5rem 1rem;border:none;border-radius:4px;cursor:pointer;margin:.25rem}btn:hover{background:#2563eb}</style>
</head>
<body>
<div class="header"><h1>🖥️ Sovereign RMM</h1><div class="status">● Connected</div></div>
<div class="container">
<div class="stats">
<div class="stat-card"><h3>Total Devices</h3><div class="value" id="total-devices">0</div></div>
<div class="stat-card"><h3>Online</h3><div class="value" style="color:#10b981" id="online-devices">0</div></div>
<div class="stat-card"><h3>Offline</h3><div class="value" style="color:#ef4444" id="offline-devices">0</div></div>
<div class="stat-card"><h3>Locked Down</h3><div class="value" style="color:#f97316" id="locked-devices">0</div></div>
</div>
<div class="devices"><h2>Devices</h2><div id="devices-table"><div class="loading">Loading...</div></div></div>
</div>
<script>
async function loadDevices(){
try{
const r=await fetch('/api/devices/');
const devices=await r.json();
document.getElementById('total-devices').textContent=devices.length;
document.getElementById('online-devices').textContent=devices.filter(d=>d.status==='online').length;
document.getElementById('offline-devices').textContent=devices.filter(d=>d.status==='offline').length;
document.getElementById('locked-devices').textContent=devices.filter(d=>d.locked_down).length;
const html='<table><thead><tr><th>Hostname</th><th>Type</th><th>IP</th><th>OS</th><th>CPU</th><th>RAM</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
devices.map(d=>'<tr><td>'+d.hostname+'</td><td>'+(d.device_type||'-')+'</td><td>'+(d.ip_address||'-')+'</td><td>'+(d.os_version||'-')+'</td><td>'+(d.cpu_usage?d.cpu_usage.toFixed(1)+'%':'-')+'</td><td>'+(d.ram_used&&d.ram_total?(d.ram_used/d.ram_total*100).toFixed(0)+'%':'-')+'</td><td><span class="status-badge status-'+d.status+'">'+d.status+(d.locked_down?' 🔒':'')+'</span></td><td><button class="btn" onclick="lockdown(\''+d.id+'\')">Lockdown</button></td></tr>').join('')+
'</tbody></table>';
document.getElementById('devices-table').innerHTML=html;
}catch(e){
document.getElementById('devices-table').innerHTML='<div class="loading">Error loading devices</div>';
}}
async function lockdown(id){
if(confirm('Lock down this device?')){
await fetch('/api/lockdown/device/'+id,{method:'POST'});
loadDevices();
}}
loadDevices();
setInterval(loadDevices,30000);
</script>
</body>
</html>
